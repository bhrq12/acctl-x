<%#
AC Controller — AC Info Widget
Displays controller basic info from UCI config.
%>
<div style="background:#f5f5f5;padding:10px;border-radius:4px;font-family:monospace">
    <div><strong>UUID:</strong> <span id="ac-uuid">Loading...</span></div>
    <div><strong>Interface:</strong> <%=self:cfgvalue("interface") or "br-lan"%></div>
    <div><strong>TCP Port:</strong> <%=self:cfgvalue("port") or "7960"%></div>
    <div><strong>Broadcast:</strong> <%=self:cfgvalue("brditv") or "30"%>s</div>
</div>
<script type="text/javascript">
    XHR.get('<%=controller%>/admin/network/acctl/api/status', null, function(x, d) {
        var el = document.getElementById('ac-uuid');
        if (el && d) el.textContent = d.uuid || 'N/A';
    });
</script>
