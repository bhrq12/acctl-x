<% local band = self.value or "" %>
<% if band == "5GHz" then %>
<span style="color:#d04a1f;font-weight:bold">5GHz</span>
<% elseif band == "dual" then %>
<span style="color:#1fa3d4;font-weight:bold">Dual-Band</span>
<% elseif band == "2.4GHz" then %>
<span style="color:#1fa3d4;font-weight:bold">2.4GHz</span>
<% else %>
<span style="color:#999"><%==band%></span>
<% end %>
