# 自定义 feeds 配置
# 此文件会被追加到 OpenWrt 源码的 feeds.conf.default
#
# 格式: src-link <name> <path>
#       src-git  <name> <url>[<branch>]
#
# 示例：本地软件包（相对路径，相对于 OpenWrt 源码根目录）
# src-link mypackages /path/to/my-packages

# acctl 软件包（已通过 build.sh 的 git clone 方式引入，无需在此配置）
# 如需改用 feeds 方式，注释掉 build.sh 中的 git clone，改用：
# src-git acctl https://github.com/你的用户名/acctl

# Lean 扩展包（可选）
# src-git lean_packages https://github.com/coolsnowwolf/packages

# LuCI 主题（可选）
# src-git luci_theme https://github.com/xxxx/luci-theme-xxx
