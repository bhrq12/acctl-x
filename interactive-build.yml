name: Interactive Build for AP4220 128m Plus

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'normal'
        type: choice
        options:
          - normal
          - full
          - minimal
      upload_bin:
        description: '上传Bin目录'
        required: true
        default: 'false'
        type: boolean
      firmware_release:
        description: '发布固件'
        required: true
        default: 'true'
        type: boolean
      clash_kernel:
        description: 'Clash内核架构'
        required: true
        default: 'arm64'
        type: choice
        options:
          - arm64
          - arm
          - amd64
          - i386
  # schedule:
  #   - cron: 0 20 * * *

jobs:
  call-main-build:
    name: Call Main Build Workflow
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@main
      
      - name: Build Configuration Summary
        run: |
          echo "========================================"
          echo "构建配置摘要"
          echo "========================================"
          echo "构建类型: ${{ github.event.inputs.build_type }}"
          echo "Clash内核架构: ${{ github.event.inputs.clash_kernel }}"
          echo "上传Bin目录: ${{ github.event.inputs.upload_bin }}"
          echo "发布固件: ${{ github.event.inputs.firmware_release }}"
          echo "========================================"
          echo "正在启动主构建工作流..."
          echo "========================================"
      
      - name: Call Main Build Workflow
        uses: actions/github-script@v6
        with:
          script: |
            const workflow_id = 'main-build.yml';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            console.log(`触发主构建工作流: ${workflow_id}`);
            
            try {
              const response = await github.rest.actions.createWorkflowDispatch({
                owner,
                repo,
                workflow_id,
                ref: context.sha,
                inputs: {
                  build_type: '${{ github.event.inputs.build_type }}',
                  upload_bin: ${{ github.event.inputs.upload_bin }},
                  firmware_release: ${{ github.event.inputs.firmware_release }},
                  clash_kernel: '${{ github.event.inputs.clash_kernel }}'
                }
              });
              
              console.log(`主构建工作流触发成功: ${response.status}`);
              console.log(`请查看 Actions 页面了解构建进度`);
            } catch (error) {
              console.error(`触发主构建工作流失败: ${error.message}`);
              throw error;
            }
